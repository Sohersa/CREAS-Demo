<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AXIS · Digital Twin — v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --bg: #F7F6F2;
    --bg-2: #EFEDE7;
    --surface: #ffffff;
    --ink: #0A0A0A;
    --ink-2: #3A3A37;
    --ink-3: #76746E;
    --ink-4: #A8A59D;
    --line: #E8E5DD;
    --line-strong: #D3CFC4;
    --accent: #FF5500;
    --accent-ink: #B73A00;
    --accent-soft: #FFF1E6;
    --ok: #0E7A3D;
    --ok-soft: #E3F1E6;
    --warn: #B06A00;
    --warn-soft: #FBEFD6;
    --err: #B1342E;
    --err-soft: #F9E4E1;
    --info: #1E4DB8;
    --info-soft: #E4ECFB;
    --font-sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, monospace;
  }

  /* ═══ DARK THEME — FUTURISTIC HUD ═══ */
  [data-theme="dark"]{
    --bg: #05070B;
    --bg-2: #0B0F16;
    --surface: #0D1220;
    --ink: #E6F4FF;
    --ink-2: #AFC8DC;
    --ink-3: #6B8299;
    --ink-4: #3E5163;
    --line: rgba(120,200,255,0.10);
    --line-strong: rgba(120,200,255,0.25);
    --accent: #00E5FF;
    --accent-ink: #7FF4FF;
    --accent-soft: rgba(0,229,255,0.10);
    --ok: #3DF5B0; --ok-soft: rgba(61,245,176,.10);
    --warn: #FFD166; --warn-soft: rgba(255,209,102,.10);
    --err: #FF5C8A; --err-soft: rgba(255,92,138,.10);
    --info: #6AA7FF; --info-soft: rgba(106,167,255,.10);
  }
  [data-theme="dark"][data-accent="orange"]{--accent:#FF7A3D;--accent-ink:#FFB380;--accent-soft:rgba(255,122,61,.12)}
  [data-theme="dark"][data-accent="graphite"]{--accent:#E6F4FF;--accent-ink:#E6F4FF;--accent-soft:rgba(230,244,255,.10)}
  [data-theme="dark"][data-accent="indigo"]{--accent:#8A7FFF;--accent-ink:#C0B8FF;--accent-soft:rgba(138,127,255,.12)}
  [data-theme="dark"][data-accent="teal"]{--accent:#00E5FF;--accent-ink:#7FF4FF;--accent-soft:rgba(0,229,255,.12)}

  [data-theme="dark"] body,
  [data-theme="dark"] > div{
    background:
      radial-gradient(ellipse 1200px 800px at 20% 0%, rgba(0,229,255,0.08), transparent 60%),
      radial-gradient(ellipse 900px 600px at 100% 100%, rgba(138,127,255,0.06), transparent 60%),
      #05070B !important;
  }
  [data-theme="dark"] .dotgrid{background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px),
    radial-gradient(circle at 1px 1px, rgba(0,229,255,0.18) 1px, transparent 0) !important;
    background-size: 44px 44px, 44px 44px, 44px 44px !important}
  [data-theme="dark"] .noise::after{opacity:.35;mix-blend-mode:screen}
  [data-theme="dark"] [data-role="viewer-3d-bg"]{
    background: radial-gradient(ellipse 80% 70% at 50% 40%, rgba(0,229,255,0.06), transparent 70%), #070B12 !important;
  }
  [data-theme="dark"] [data-role="viewer-3d-bg"]::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image: repeating-linear-gradient(0deg, rgba(0,229,255,0.025) 0 1px, transparent 1px 3px);
    mix-blend-mode:screen;
  }

  [data-theme="dark"] .floating{
    background: linear-gradient(180deg, rgba(13,18,32,0.92), rgba(8,12,22,0.92)) !important;
    border:1px solid rgba(0,229,255,0.18) !important;
    box-shadow: 0 0 0 1px rgba(0,229,255,0.04) inset, 0 20px 40px -16px rgba(0,229,255,0.08), 0 1px 0 rgba(0,229,255,0.12) inset !important;
    backdrop-filter: blur(14px) saturate(1.3); -webkit-backdrop-filter: blur(14px) saturate(1.3);
  }
  [data-theme="dark"] .card{
    background: linear-gradient(180deg, rgba(13,18,32,0.7), rgba(8,12,22,0.7)) !important;
    border-color: var(--line) !important;
    box-shadow: 0 0 0 1px rgba(0,229,255,0.03) inset;
  }
  [data-theme="dark"] .btn{
    background: rgba(13,18,32,0.7) !important;
    border-color: var(--line-strong) !important;
    color: var(--ink) !important;
  }
  [data-theme="dark"] .btn:hover{background:rgba(0,229,255,0.08) !important;border-color:var(--accent) !important;color:var(--accent-ink) !important}
  [data-theme="dark"] .btn.accent{background:var(--accent) !important;color:#001018 !important;border-color:var(--accent) !important;box-shadow:0 0 20px -4px var(--accent),0 0 0 1px var(--accent)}
  [data-theme="dark"] .btn.primary{background:var(--accent) !important;color:#001018 !important;border-color:var(--accent) !important;box-shadow:0 0 18px -4px var(--accent)}
  [data-theme="dark"] .btn.ghost{background:transparent !important;border-color:transparent !important}
  [data-theme="dark"] .btn.ghost:hover{background:rgba(0,229,255,0.08) !important}

  [data-theme="dark"] .pill{background:rgba(0,229,255,0.06);border-color:var(--line-strong);color:var(--ink-2)}
  [data-theme="dark"] .pill.live{background:rgba(61,245,176,.12);color:var(--ok);border-color:rgba(61,245,176,.35);text-shadow:0 0 8px rgba(61,245,176,.5)}
  [data-theme="dark"] .pill.accent{background:var(--accent-soft);color:var(--accent-ink);border-color:rgba(0,229,255,.4);text-shadow:0 0 8px rgba(0,229,255,.4)}
  [data-theme="dark"] .pill.err{text-shadow:0 0 8px rgba(255,92,138,.4)}
  [data-theme="dark"] .pill.warn{text-shadow:0 0 8px rgba(255,209,102,.4)}

  [data-theme="dark"] .eyebrow{color:var(--accent);text-shadow:0 0 8px var(--accent-soft)}
  [data-theme="dark"] .mega-num{text-shadow:0 0 18px rgba(0,229,255,0.25)}
  [data-theme="dark"] .chip{background:rgba(13,18,32,0.7);border-color:var(--line-strong);color:var(--ink-2)}
  [data-theme="dark"] .chip.active{background:var(--accent);color:#001018;border-color:var(--accent);box-shadow:0 0 16px -2px var(--accent)}
  [data-theme="dark"] kbd{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,.2);color:var(--accent-ink)}
  [data-theme="dark"] input[type="range"].ax{background:rgba(0,229,255,0.15)}
  [data-theme="dark"] input[type="range"].ax::-webkit-slider-thumb{background:var(--accent);border-color:#05070B;box-shadow:0 0 12px var(--accent)}
  [data-theme="dark"] input[type="range"].ax::-moz-range-thumb{background:var(--accent);border-color:#05070B;box-shadow:0 0 12px var(--accent)}

  [data-theme="dark"] .bar-bg{background:repeating-linear-gradient(90deg, rgba(0,229,255,.08) 0 1px, transparent 1px 24px),rgba(0,229,255,0.04)}
  [data-theme="dark"] ::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.25);border-color:transparent}
  /* ═══ LEGIBILITY SAFETY — applies in both themes ═══ */
  /* Anything with data-ink-bg should flip its text to the opposite of --ink */
  [data-theme="dark"] [data-ink-bg]{color:#05070B !important}
  :root:not([data-theme]) [data-ink-bg], [data-theme="light"] [data-ink-bg]{color:#fff !important}
  /* Svg logo stroke must always contrast with its rect fill */
  [data-theme="dark"] svg rect[fill="var(--ink)"] + path{stroke:#05070B !important}
  /* fallback — any text that still reads as white on white / black on black */
  [data-theme="dark"] body, [data-theme="dark"] header, [data-theme="dark"] aside, [data-theme="dark"] main{color:var(--ink)}
  [data-theme="dark"] .mono, [data-theme="dark"] h1, [data-theme="dark"] h2, [data-theme="dark"] h3, [data-theme="dark"] h4, [data-theme="dark"] span, [data-theme="dark"] p, [data-theme="dark"] div, [data-theme="dark"] button{color:inherit}
  [data-theme="dark"] table.ax thead th{color:var(--accent)}
  [data-theme="dark"] table.ax tbody tr:hover{background:rgba(0,229,255,0.05)}
  [data-theme="dark"] .ruled{background:
    linear-gradient(rgba(0,229,255,0.08) 1px, transparent 1px) 0 0/100% 24px,
    linear-gradient(90deg, rgba(0,229,255,0.08) 1px, transparent 1px) 0 0/24px 100%}

  /* scanline overlay for whole app */
  [data-theme="dark"]::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:999;
    background: repeating-linear-gradient(0deg, rgba(0,229,255,0.012) 0 1px, transparent 1px 3px);
  }
  @keyframes scanmove{from{background-position-y:0}to{background-position-y:3px}}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-0.012em}
  button{font-family:inherit;color:inherit}
  .mono{font-family:var(--font-mono);letter-spacing:-0.01em;font-feature-settings:"zero"}
  .serif{font-family:var(--font-sans);font-weight:600;letter-spacing:-0.035em}
  ::selection{background:var(--ink);color:#fff}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:10px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-track{background:transparent}

  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(14,122,61,.5)}100%{box-shadow:0 0 0 10px rgba(14,122,61,0)}}
  .live-dot{animation:pulse 1.8s ease-out infinite}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:500}
  .num{font-family:var(--font-mono);font-feature-settings:"zero","tnum";letter-spacing:-0.02em}

  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* density variants */
  [data-density="compact"]{--pad:10px;--gap:8px}
  [data-density="balanced"]{--pad:16px;--gap:12px}
  [data-density="spacious"]{--pad:22px;--gap:18px}

  /* accent */
  [data-accent="orange"]{--accent:#FF5500;--accent-ink:#B73A00;--accent-soft:#FFF1E6}
  [data-accent="graphite"]{--accent:#0A0A0A;--accent-ink:#0A0A0A;--accent-soft:#EFEDE7}
  [data-accent="indigo"]{--accent:#4536FF;--accent-ink:#2A1FB5;--accent-soft:#ECEAFF}
  [data-accent="teal"]{--accent:#006B5F;--accent-ink:#004B42;--accent-soft:#E0F0ED}

  /* fonts */
  [data-type="geist"]{--font-sans:'Geist', ui-sans-serif, sans-serif;--font-mono:'Geist Mono',monospace}
  [data-type="inter"]{--font-sans:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace}
  [data-type="serif"]{--font-sans:'Geist','ui-sans-serif',sans-serif;--font-mono:'Geist Mono',monospace;letter-spacing:-0.015em}

  /* glass */
  [data-glass="glass"] .floating{background:rgba(255,255,255,.7);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);border:1px solid rgba(255,255,255,.8);box-shadow:0 10px 30px -12px rgba(10,10,10,.14), 0 1px 0 rgba(255,255,255,.9) inset}
  [data-glass="solid"] .floating{background:var(--surface);border:1px solid var(--line);box-shadow:0 1px 0 rgba(10,10,10,.03),0 4px 14px -6px rgba(10,10,10,.08)}

  /* Noise bg */
  .noise{position:relative}
  .noise::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.25;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.06  0 0 0 0 0.06  0 0 0 0 0.06  0 0 0 0.12 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>")}

  .dotgrid{background-image:radial-gradient(circle at 1px 1px, rgba(10,10,10,0.07) 1px, transparent 0);background-size:22px 22px}
  .ruled{background:
    linear-gradient(var(--line) 1px, transparent 1px) 0 0/100% 24px,
    linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0/24px 100%}

  /* pill */
  .pill{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;background:var(--bg-2);color:var(--ink-2);border:1px solid var(--line);line-height:1.6;font-weight:500}
  .pill.live{background:var(--ok-soft);color:var(--ok);border-color:#C9E2D0}
  .pill.warn{background:var(--warn-soft);color:var(--warn);border-color:#EFDCB3}
  .pill.err{background:var(--err-soft);color:var(--err);border-color:#EFC8C3}
  .pill.accent{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent);border-color:color-mix(in srgb, var(--accent) 40%, transparent)}
  .pill.dark{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* btn */
  .btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;border-radius:999px;background:var(--surface);color:var(--ink);border:1px solid var(--line);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .14s cubic-bezier(.2,.8,.2,1);letter-spacing:-0.005em}
  .btn:hover{background:var(--bg-2);border-color:var(--line-strong)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#222}
  .btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.accent:hover{filter:brightness(.94)}
  .btn.ghost{background:transparent;border-color:transparent}
  .btn.ghost:hover{background:var(--bg-2)}
  .btn.sm{height:26px;padding:0 10px;font-size:11.5px}
  .btn.xs{height:22px;padding:0 8px;font-size:10.5px}
  .btn.icon{width:32px;padding:0;justify-content:center}
  .btn.icon.sm{width:26px}
  .btn.icon.xs{width:22px}

  kbd{font-family:var(--font-mono);font-size:10px;padding:2px 5px;border-radius:4px;background:var(--bg-2);border:1px solid var(--line);color:var(--ink-3);font-weight:500}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px}

  /* brutalist divider */
  .brut-divider{display:flex;align-items:center;gap:10px;margin:6px 0}
  .brut-divider::before,.brut-divider::after{content:"";flex:1;height:1px;background:var(--line)}

  /* Stripe-like number */
  .mega-num{font-family:var(--font-sans);font-weight:500;letter-spacing:-0.045em;line-height:.95;font-feature-settings:"ss01","tnum","zero"}

  /* modal */
  .mo-overlay{position:fixed;inset:0;background:rgba(10,10,10,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:90;animation:fadein .15s}
  .mo-card{animation:slideup .22s cubic-bezier(.2,.8,.2,1)}

  input[type="range"].ax{-webkit-appearance:none;appearance:none;height:3px;background:var(--line-strong);border-radius:999px;outline:none}
  input[type="range"].ax::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ink);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  input[type="range"].ax::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--ink);cursor:pointer;border:2px solid #fff}

  table.ax{width:100%;border-collapse:collapse}
  table.ax th,table.ax td{padding:10px 14px;text-align:left;font-size:12.5px;border-bottom:1px solid var(--line)}
  table.ax thead th{font-family:var(--font-mono);font-weight:500;color:var(--ink-3);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
  table.ax tbody tr:hover{background:var(--bg-2)}

  /* chip */
  .chip{display:inline-flex;align-items:center;gap:5px;height:26px;padding:0 11px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em;color:var(--ink-2);cursor:pointer;font-weight:500}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* bar row */
  .bar-bg{height:22px;background:repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 24px),var(--bg-2);border:1px solid var(--line);border-radius:4px;position:relative;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="v2/icons.jsx"></script>
<script type="text/babel" src="v2/atoms.jsx"></script>
<script type="text/babel" src="v2/topbar.jsx"></script>
<script type="text/babel" src="v2/sidebar.jsx"></script>
<script type="text/babel" src="v2/viewer.jsx"></script>
<script type="text/babel" src="v2/inspector.jsx"></script>
<script type="text/babel" src="v2/hero.jsx"></script>
<script type="text/babel" src="v2/copilot.jsx"></script>
<script type="text/babel" src="v2/modals.jsx"></script>
<script type="text/babel" src="v2/tweaks.jsx"></script>
<script type="text/babel" src="v2/app.jsx"></script>
</body>
</html>
