<!DOCTYPE html>
<html lang="es" translate="no">
<head>
<meta charset="UTF-8">
<title>OBRA YA — Playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="es">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design/tokens.css?v=2">
<link rel="stylesheet" href="design/components.css?v=2">
<link rel="stylesheet" href="design/playground.css?v=2">
<link rel="stylesheet" href="design/mobile.css?v=1">
<style>
  #goog-gt-tt, .goog-te-banner-frame, .skiptranslate,
  .goog-tooltip, .goog-text-highlight, iframe.skiptranslate,
  body > .VIpgJd-ZVi9od-aZ2wEe-wOHMyf {
    display: none !important;
    visibility: hidden !important;
  }
  body { top: 0 !important; }
  html { margin-top: 0 !important; }
</style>
</head>
<body>

<div id="pg-root"></div>

<script>
  window.__PG_CFG = /*EDITMODE-BEGIN*/{
    "lang": "es",
    "accent": "violet",
    "density": "comfy",
    "autoplay": true
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design/Playground_Data.jsx"></script>
<script type="text/babel" src="design/Playground_Capture.jsx"></script>
<script type="text/babel" src="design/Playground_Flow.jsx"></script>
<script type="text/babel" src="design/Playground_Rest.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function PgApp() {
  const [lang, setLang] = useState(window.__PG_CFG.lang || 'es');
  const [accent, setAccent] = useState(window.__PG_CFG.accent || 'violet');
  const [density, setDensity] = useState(window.__PG_CFG.density || 'comfy');
  const [tweaksOn, setTweaksOn] = useState(false);

  // ── state ──
  const [screen, setScreen] = useState(() => localStorage.getItem('pg:screen') || 'dashboard');
  const [orders, setOrders] = useState(() => {
    try { return JSON.parse(localStorage.getItem('pg:orders')) || window.PG_INITIAL_ORDERS; }
    catch { return window.PG_INITIAL_ORDERS; }
  });
  const [toast, setToast] = useState(null);
  const [site, setSite] = useState('sierra');

  useEffect(() => { localStorage.setItem('pg:screen', screen); }, [screen]);
  useEffect(() => { localStorage.setItem('pg:orders', JSON.stringify(orders)); }, [orders]);
  useEffect(() => { document.documentElement.setAttribute('data-accent', accent); document.documentElement.setAttribute('data-density', density); }, [accent, density]);
  useEffect(() => { if (toast) { const t = setTimeout(() => setToast(null), 3500); return () => clearTimeout(t); } }, [toast]);

  // Tweaks wiring
  useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);
  const persist = (k, v) => window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');

  const T = (es, en) => lang === 'es' ? es : en;

  // Order actions
  const createOrder = (o) => {
    const id = 'OY-' + (8423 + orders.length);
    const next = { id, site, item:o.item, qty:o.qty, unit:o.unit, winner:null, total:0, status:'cotizando', createdAt:T('Ahora','Now'), eta:'—', progress:0, po:null, cfdi:null, paid:false };
    setOrders([next, ...orders]);
    setToast({ msg: T(`Pedido ${id} creado · 6 proveedores notificados`, `Order ${id} created · 6 suppliers notified`), type:'ok' });
    setTimeout(() => setScreen('quote'), 600);
  };

  const approveOrder = (id, winner, total) => {
    setOrders(os => os.map(o => o.id === id ? { ...o, winner, total, status:'aprobada', po:'PO-'+id.slice(3), progress:10 } : o));
    setToast({ msg: T(`PO emitido · ${winner.toUpperCase()} confirmó a ${window.pgMoney(total)}`, `PO issued · ${winner.toUpperCase()} confirmed at ${window.pgMoney(total)}`), type:'ok' });
  };

  const payOrder = (id) => {
    setOrders(os => os.map(o => o.id === id ? { ...o, paid:true, status:'pagada' } : o));
  };

  const resetDemo = () => {
    localStorage.removeItem('pg:orders'); localStorage.removeItem('pg:screen');
    setOrders(window.PG_INITIAL_ORDERS); setScreen('dashboard');
    setToast({ msg: T('Demo reiniciado','Demo reset'), type:'ok' });
  };

  // Sidebar items with live badges
  const activeCount = orders.filter(o => ['cotizando','aprobada','transito'].includes(o.status)).length;
  const quotingCount = orders.filter(o => o.status === 'cotizando').length;
  const payableCount = orders.filter(o => o.cfdi && !o.paid).length;

  const nav = [
    { label: T('TRABAJO','WORK'), items: [
      { k:'dashboard', ic:'🏠', t:T('Dashboard','Dashboard') },
      { k:'capture', ic:'💬', t:T('Captura pedido','Capture request'), badge:'NEW' },
      { k:'quote', ic:'⚡', t:T('Cotización en vivo','Live quote'), badge: quotingCount, live:true },
      { k:'orders', ic:'📋', t:T('Pedidos','Orders'), badge: activeCount },
      { k:'tracking', ic:'📍', t:T('Tracking en vivo','Live tracking'), live:true }
    ]},
    { label: T('FINANZAS','FINANCE'), items: [
      { k:'finance', ic:'💳', t:T('Finanzas','Finance'), badge: payableCount, warn:true },
      { k:'reports', ic:'📊', t:T('Reportes','Reports') }
    ]},
    { label: T('RED','NETWORK'), items: [
      { k:'suppliers', ic:'🏭', t:T('Proveedores','Suppliers'), badge:1247 }
    ]},
    { label: T('ADMIN','ADMIN'), items: [
      { k:'admin', ic:'⚙️', t:T('Administración','Admin') }
    ]}
  ];

  const pageTitles = {
    dashboard: { t:T('Dashboard','Dashboard'), d:T('Vista ejecutiva · 3 obras activas','Executive view · 3 active sites') },
    capture:   { t:T('Capturar pedido','Capture request'), d:T('Como si fueras residente de obra','As if you were a foreman') },
    quote:     { t:T('Cotización en vivo','Live quote'), d:T('6 proveedores · en paralelo','6 suppliers · in parallel') },
    orders:    { t:T('Pedidos','Orders'), d:T('Historial y seguimiento','History & tracking') },
    tracking:  { t:T('Tracking en vivo','Live tracking'), d:T('Camiones en ruta a obra','Trucks en route to site') },
    finance:   { t:T('Finanzas','Finance'), d:T('CFDI · SPEI · Crédito OBRA YA','CFDI · SPEI · OBRA YA Credit') },
    reports:   { t:T('Reportes','Reports'), d:T('Ahorro, top proveedores, partidas','Savings, top suppliers, lines') },
    suppliers: { t:T('Red de proveedores','Supplier network'), d:T('1,247 activos · 32 ciudades','1,247 active · 32 cities') },
    admin:     { t:T('Administración','Admin'), d:T('Políticas, usuarios, integraciones','Policies, users, integrations') }
  };

  const currentTitle = pageTitles[screen] || pageTitles.dashboard;
  const currentSite = window.PG_SITES.find(s => s.id === site);

  return (
    <>
      {/* TOP BAR */}
      <div className="pg-top">
        <div className="pg-top-brand">
          <svg width="22" height="22" viewBox="0 0 32 32">
            <defs><linearGradient id="pglg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop offset="0" stopColor="#FF7A45"/><stop offset="1" stopColor="#635BFF"/></linearGradient></defs>
            <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#pglg)"/>
            <path d="M10 22V14a6 6 0 0 1 12 0v8" stroke="white" strokeWidth="2.4" fill="none" strokeLinecap="round"/>
            <circle cx="16" cy="14" r="1.6" fill="white"/>
          </svg>
          <span>OBRA YA</span>
          <span className="pg-top-env">PLAYGROUND · {T('demo','demo')}</span>
        </div>
        <div className="pg-top-search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <span>{T('Buscar pedidos, proveedores, CFDI...','Search orders, suppliers, CFDI...')}</span>
          <kbd>⌘K</kbd>
        </div>
        <div className="pg-top-spacer"/>
        <div className="pg-top-site" onClick={() => {
          const i = window.PG_SITES.findIndex(s => s.id === site);
          const next = window.PG_SITES[(i+1) % window.PG_SITES.length];
          setSite(next.id);
        }}>
          <span className="dot"/>
          <span>{currentSite?.code} · {currentSite?.name.split('·')[0].trim()}</span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div className="pg-top-ic" title="Notifs">
          🔔<span className="badge">4</span>
        </div>
        <div className="pg-top-ic" title="Help">?</div>
        <div className="pg-top-avatar">RS</div>
        <a href="Landing.html" className="pg-top-close">← {T('Volver al sitio','Back to site')}</a>
      </div>

      {/* BODY */}
      <div className="pg-body">
        {/* SIDEBAR */}
        <aside className="pg-side">
          {nav.map((grp, gi) => (
            <div key={gi}>
              <div className="pg-side-label">{grp.label}</div>
              <div className="pg-side-group">
                {grp.items.map(it => (
                  <div key={it.k} className={`pg-side-item ${screen === it.k ? 'on' : ''}`} onClick={() => setScreen(it.k)}>
                    <span className="pg-side-ic">{it.ic}</span>
                    <span>{it.t}</span>
                    {it.live && <span style={{ width:6, height:6, borderRadius:'50%', background:'#00D97E', boxShadow:'0 0 0 3px rgba(0,217,126,0.2)', marginLeft:6 }}/>}
                    {it.badge != null && <span className={`pg-side-badge ${it.warn ? 'warn' : ''} ${typeof it.badge === 'string' ? 'neutral' : ''}`}>{typeof it.badge === 'number' && it.badge > 99 ? '99+' : it.badge}</span>}
                  </div>
                ))}
              </div>
            </div>
          ))}

          <div style={{ marginTop:'auto', padding:14, background:'linear-gradient(135deg, #0A2540, #1A365D)', borderRadius:12, color:'white', position:'relative', overflow:'hidden' }}>
            <div style={{ fontSize:10, fontFamily:'var(--font-mono)', opacity:0.6, letterSpacing:'0.08em' }}>OBRA YA</div>
            <div style={{ fontSize:14, fontWeight:600, marginTop:4 }}>{T('Crédito activo','Active credit')}</div>
            <div style={{ fontSize:20, fontWeight:700, letterSpacing:'-0.02em', marginTop:6, fontFamily:'var(--font-mono)' }}>$1.15M</div>
            <div style={{ fontSize:10, opacity:0.7 }}>{T('disponible','available')}</div>
            <div style={{ height:4, background:'rgba(255,255,255,0.15)', borderRadius:100, marginTop:10, overflow:'hidden' }}>
              <div style={{ width:'42%', height:'100%', background:'linear-gradient(90deg, var(--orange), var(--pink))' }}/>
            </div>
            <button onClick={resetDemo} style={{ marginTop:10, width:'100%', padding:'6px 8px', fontSize:10, background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.15)', color:'white', borderRadius:6, cursor:'pointer', fontFamily:'inherit', letterSpacing:'0.04em', textTransform:'uppercase', fontWeight:600 }}>↻ {T('Reiniciar demo','Reset demo')}</button>
          </div>
        </aside>

        {/* MAIN */}
        <main className="pg-main">
          <div className="pg-page-hdr">
            <div>
              <div className="pg-page-t">{currentTitle.t}</div>
              <div className="pg-page-d">{currentTitle.d}</div>
            </div>
            <div className="pg-lang-toggle">
              <button className={lang === 'es' ? 'on' : ''} onClick={() => { setLang('es'); persist('lang', 'es'); }}>ES</button>
              <button className={lang === 'en' ? 'on' : ''} onClick={() => { setLang('en'); persist('lang', 'en'); }}>EN</button>
            </div>
          </div>

          {screen === 'dashboard' && <window.PgScreenDashboard lang={lang} orders={orders} setToast={setToast}/>}
          {screen === 'capture' && <window.PgScreenCapture lang={lang} onCreateOrder={createOrder} setToast={setToast}/>}
          {screen === 'quote' && <window.PgScreenQuote lang={lang} orders={orders} onApprove={approveOrder} setToast={setToast}/>}
          {screen === 'orders' && <window.PgScreenOrders lang={lang} orders={orders} setScreen={setScreen} setToast={setToast}/>}
          {screen === 'tracking' && <window.PgScreenTracking lang={lang} orders={orders}/>}
          {screen === 'finance' && <window.PgScreenFinance lang={lang} orders={orders} onPay={payOrder} setToast={setToast}/>}
          {screen === 'reports' && <window.PgScreenReports lang={lang}/>}
          {screen === 'suppliers' && <window.PgScreenSuppliers lang={lang} setToast={setToast}/>}
          {screen === 'admin' && <window.PgScreenAdmin lang={lang} setToast={setToast}/>}
        </main>
      </div>

      {/* TOAST */}
      {toast && (
        <div className="pg-toast">
          <div className="pg-toast-ic">{toast.type === 'ok' ? '✓' : '!'}</div>
          <div style={{ fontSize:13, fontWeight:500 }}>{toast.msg}</div>
        </div>
      )}

      {/* TWEAKS */}
      <div className={`tweaks ${tweaksOn ? 'on' : ''}`}>
        <div className="tweaks-hdr"><h4>Tweaks</h4><div className="v">pg</div></div>
        <div className="tweaks-body">
          <div className="tweak">
            <label>{T('Acento','Accent')}</label>
            <div className="tweak-swatches">
              {['violet', 'orange', 'cyan', 'mono'].map(c => (
                <div key={c} className={`tweak-swatch ${accent === c ? 'on' : ''}`} data-k={c} onClick={() => { setAccent(c); persist('accent', c); }}/>
              ))}
            </div>
          </div>
          <div className="tweak">
            <label>{T('Densidad','Density')}</label>
            <div className="tweak-pills">
              {['comfy','compact'].map(d => (
                <button key={d} className={`tweak-pill ${density === d ? 'on' : ''}`} onClick={() => { setDensity(d); persist('density', d); }}>{d === 'comfy' ? T('Cómoda','Comfy') : T('Compacta','Compact')}</button>
              ))}
            </div>
          </div>
          <div className="tweak">
            <label>{T('Idioma','Language')}</label>
            <div className="tweak-pills">
              {['es','en'].map(l => (
                <button key={l} className={`tweak-pill ${lang === l ? 'on' : ''}`} onClick={() => { setLang(l); persist('lang', l); }}>{l.toUpperCase()}</button>
              ))}
            </div>
          </div>
          <div style={{ paddingTop:10, borderTop:'1px solid var(--line)', marginTop:6 }}>
            <button onClick={resetDemo} style={{ width:'100%', padding:'8px 10px', fontSize:11, background:'var(--paper-2)', border:'1px solid var(--line-2)', borderRadius:6, cursor:'pointer', fontFamily:'inherit', fontWeight:600, color:'var(--ink-2)' }}>↻ {T('Reiniciar demo','Reset demo')}</button>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('pg-root')).render(<PgApp/>);
</script>
</body>
</html>
