              <div style={{fontSize:13,color:'#8FA3BA',marginTop:2}}>{t('Director de Obra · Constructora del Valle','Site Director · Constructora del Valle')}</div>

              <div style={{width:56,height:56,margin:'0 auto 12px',borderRadius:14,background:'linear-gradient(135deg,#635BFF,#00D4FF)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:14}}>OY</div>

              <div style={{fontSize:11,color:'var(--ink-muted)',marginTop:12}}>{t('enruta la orden','routes the order')}</div>

            <svg width="40" height="20" viewBox="0 0 40 20"><path d="M0 10h34M30 5l5 5-5 5" stroke="#635BFF" strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>
            <div style={{textAlign:'center'}}>
              <div style={{width:56,height:56,margin:'0 auto 12px',borderRadius:14,background:'linear-gradient(135deg,#0A2540,#425466)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:22}}>🏭</div>
              <div style={{fontSize:13,fontWeight:700,color:'var(--ink)',letterSpacing:'-0.01em'}}>{t('PROVEEDOR','SUPPLIER')}</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:22,fontWeight:600,color:'#635BFF',marginTop:6}}>{t('comisión','commission')}</div>
              <div style={{fontSize:11,color:'var(--ink-muted)',marginTop:2}}>{t('sólo si vende','only if they sell')}</div>

              <div style={{fontSize:28,fontWeight:600,letterSpacing:'-0.02em',color:'var(--ink)',marginBottom:8}}>{t('Para la constructora','For the builder')}</div>
              <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:8}}>
                <span style={{fontSize:56,fontWeight:700,letterSpacing:'-0.04em',color:'var(--ink)',lineHeight:1,fontFamily:'var(--font-mono)'}}>$0</span>
                <span style={{fontSize:14,color:'var(--ink-muted)'}}>/{t('siempre','always')}</span>
              </div>
              <div style={{fontSize:14,color:'var(--ink-2)',lineHeight:1.5,marginBottom:24}}>{t('Cotizaciones, órdenes, tracking y CFDI ilimitados. No pagas setup, no hay límite de obras.','Unlimited quotes, orders, tracking and CFDI. No setup fee, no site limit.')}</div>
              <ul style={{listStyle:'none',padding:0,margin:'0 0 32px',display:'flex',flexDirection:'column',gap:12,flex:1}}>
                {[
                  t('Cotizaciones y órdenes ilimitadas','Unlimited quotes and orders'),
                  t('Agente Nico en WhatsApp','Nico agent on WhatsApp'),
                  t('Dashboard multi-obra','Multi-site dashboard'),
                  t('CFDI 4.0 automático','Automatic CFDI 4.0'),
                  t('Integración con SAP, Contpaqi, Aspel','SAP, Contpaqi, Aspel integration'),
                  t('Soporte por WhatsApp y email','WhatsApp and email support')
                ].map((f,i)=>(
                  <li key={i} style={{display:'flex',gap:10,alignItems:'flex-start',fontSize:14,color:'var(--ink-2)'}}>
                    <svg width="18" height="18" viewBox="0 0 18 18" style={{flexShrink:0,marginTop:2}}><circle cx="9" cy="9" r="9" fill="#E8F5E9"/><path d="M5 9l3 3 5-6" stroke="#00A862" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    {f}
                  </li>
                ))}
              </ul>
              <button style={{width:'100%',padding:'14px 20px',background:'var(--ink)',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{t('Empezar gratis','Start free')} →</button>
            </div>

            <div style={{background:'linear-gradient(180deg,#0A2540 0%,#1A3756 100%)',color:'#fff',borderRadius:20,padding:'36px 32px',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:0,right:0,background:'#FF7A45',color:'#fff',fontSize:10,fontWeight:600,letterSpacing:'0.14em',padding:'6px 14px',borderBottomLeftRadius:10,fontFamily:'var(--font-mono)'}}>ENTERPRISE</div>

              <div style={{fontSize:14,color:'#B8C7D9',lineHeight:1.5,marginBottom:24}}>{t('Constructoras con volumen > $50M/año o 50+ obras activas. Incluye setup, onboarding y SLA.','Builders with volume > $50M/year or 50+ active sites. Includes setup, onboarding and SLA.')}</div>
              <ul style={{listStyle:'none',padding:0,margin:'0 0 32px',display:'flex',flexDirection:'column',gap:12,flex:1}}>
                {[
                  t('Todo lo del plan Starter','Everything in Starter'),
                  t('Fee fijo por orden procesada — sin porcentaje','Flat fee per order processed — no percentage'),
                  t('SLA 99.9% garantizado','99.9% SLA guaranteed'),
                  t('Proveedores exclusivos de tu red','Exclusive suppliers from your network'),
                  t('Account manager + onboarding presencial','Account manager + on-site onboarding'),
                  t('API dedicada + webhooks personalizados','Dedicated API + custom webhooks')
                ].map((f,i)=>(
                  <li key={i} style={{display:'flex',gap:10,alignItems:'flex-start',fontSize:14,color:'#E4EAF2'}}>
                    <svg width="18" height="18" viewBox="0 0 18 18" style={{flexShrink:0,marginTop:2}}><circle cx="9" cy="9" r="9" fill="rgba(255,122,69,0.25)"/><path d="M5 9l3 3 5-6" stroke="#FF7A45" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    {f}

                ))}
              </ul>
              <button style={{width:'100%',padding:'14px 20px',background:'#FF7A45',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{t('Hablar con ventas','Talk to sales')} →</button>
            </div>
          </div>

          {/* FAQ hint */}
          <div style={{textAlign:'center',marginTop:56,fontSize:13,color:'var(--ink-muted)'}}>
            {t('¿Tienes dudas sobre el modelo?','Questions about the model?')} <a href="#" style={{color:'var(--ink)',fontWeight:600,textDecoration:'underline',textDecorationColor:'var(--line-2)',textUnderlineOffset:4}}>{t('Habla con el equipo →','Talk to the team →')}</a>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="footer">
        <div className="footer-grid">
          <div className="footer-brand">
            <div className="brand-big">OBRA YA</div>
            <p>{t('Infraestructura de compra para obras en México. Construido en Guadalajara, Jalisco.', 'Procurement infrastructure for Mexican construction. Built in Guadalajara, Jalisco.')}</p>
          </div>
          <div><h5>{t('Producto', 'Product')}</h5><ul><li><a href="#producto">{t('Cotizaciones', 'Quotes')}</a></li><li><a href="#como">{t('Cómo funciona', 'How it works')}</a></li><li><a href="#precios">{t('Precios', 'Pricing')}</a></li></ul></div>
          <div><h5>{t('Compañía', 'Company')}</h5><ul><li><a href="#">{t('Sobre nosotros', 'About')}</a></li><li><a href="#">{t('Carreras', 'Careers')}</a></li><li><a href="#">{t('Proveedores', 'Suppliers')}</a></li></ul></div>
          <div><h5>{t('Recursos', 'Resources')}</h5><ul><li><a href="#">{t('Centro de ayuda', 'Help')}</a></li><li><a href="#">{t('API docs', 'API docs')}</a></li><li><a href="#">{t('Status', 'Status')}</a></li></ul></div>
        </div>
        <div className="footer-bottom">
          <div>© 2026 OBRA YA · {t('Grupo Sohersa', 'Grupo Sohersa')}</div>
          <div>{t('Hecho en Guadalajara, Jalisco 🇲🇽', 'Made in Guadalajara, Jalisco 🇲🇽')}</div>
        </div>
      </footer>

      {/* TWEAKS */}
      <div className={`tweaks ${tweaksOn ? 'on' : ''}`}>
        <div className="tweaks-hdr"><h4>Tweaks</h4><div className="v">v2.0</div></div>
        <div className="tweaks-body">
          <div className="tweak">
            <label>{t('Acento', 'Accent')}</label>
            <div className="tweak-swatches">
              {['violet', 'orange', 'cyan', 'mono'].map(c => (
                <div key={c} className={`tweak-swatch ${accent === c ? 'on' : ''}`} data-k={c} onClick={() => { setAccent(c); persist('accent', c); }}/>
              ))}
            </div>
          </div>
          <div className="tweak">
            <label>{t('Animación', 'Motion')}</label>
            <div className="tweak-pills">
              {['default', 'calm', 'off'].map(m => (
                <button key={m} className={`tweak-pill ${motion === m ? 'on' : ''}`} onClick={() => { setMotion(m); persist('motion', m); }}>{m === 'default' ? (lang === 'es' ? 'Normal' : 'Normal') : m === 'calm' ? (lang === 'es' ? 'Calma' : 'Calm') : (lang === 'es' ? 'Apagada' : 'Off')}</button>
              ))}
            </div>
          </div>
          <div className="tweak">
            <label>{t('Idioma', 'Language')}</label>
            <div className="tweak-pills">
              {['es', 'en'].map(l => (
                <button key={l} className={`tweak-pill ${lang === l ? 'on' : ''}`} onClick={() => { setLang(l); persist('lang', l); }}>{l.toUpperCase()}</button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
